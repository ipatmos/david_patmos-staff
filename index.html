<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다윗 굿즈 - 간사 할인 신청 | 팻머스</title>
<style>
  :root{
    --wool:#FAF7F0;
    --card:#FFFFFF;
    --ink:#2B2A26;
    --olive:#5B6B3F;
    --olive-deep:#40502B;
    --honey:#C9962E;
    --honey-soft:#F4E7C8;
    --line:#E7E1D4;
    --sale:#B4552D;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:var(--wool);
    color:var(--ink);
    line-height:1.55;
    padding-bottom:120px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px}

  header{
    background:linear-gradient(160deg,var(--olive-deep) 0%,var(--olive) 100%);
    color:#F6F3E8;
    padding:34px 16px 28px;
    text-align:center;
    border-bottom:4px solid var(--honey);
  }
  header .logo{
    display:block;width:fit-content;margin:0 auto 16px;
    background:#fff;border-radius:10px;
    padding:8px 14px;line-height:0;
  }
  header .logo img{height:32px;width:auto;display:block}
  header h1{font-size:24px;font-weight:800;letter-spacing:-.01em}
  header h1 .sheep{font-size:26px;margin-right:4px}

  .notice{
    background:var(--honey-soft);border:1px solid #E4D3A6;
    border-radius:var(--radius);padding:12px 14px;font-size:13px;
    margin:16px 0 8px;color:#6B551F;
  }

  .items{margin-top:14px;display:flex;flex-direction:column;gap:10px}
  .item{
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px 14px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .item-info{flex:1;min-width:0}
  .item-name{font-size:15px;font-weight:700;margin-bottom:3px}
  .item-price{font-size:13px;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .orig{color:#A39F93;text-decoration:line-through}
  .sale-price{color:var(--sale);font-weight:800;font-size:15px}
  .off{font-size:11px;font-weight:700;color:#fff;background:var(--sale);border-radius:5px;padding:1px 6px}

  .stepper{
    display:flex;align-items:center;border:1.5px solid var(--line);
    border-radius:10px;overflow:hidden;flex-shrink:0;background:#FCFBF7;
  }
  .stepper button{
    width:38px;height:38px;border:none;background:transparent;
    font-size:20px;font-weight:600;color:var(--olive);cursor:pointer;
    transition:background .15s;-webkit-tap-highlight-color:transparent;
  }
  .stepper button:active{background:var(--honey-soft)}
  .stepper .qty{width:36px;text-align:center;font-size:16px;font-weight:800;color:var(--ink)}
  .item.selected{border-color:var(--olive);box-shadow:0 0 0 1px var(--olive)}

  .form-sec{
    margin-top:22px;background:var(--card);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 16px;
  }
  .sec-title{font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--olive-deep);margin-bottom:12px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:#7A766A;margin-bottom:5px}
  .field input{
    width:100%;padding:11px 12px;font-size:15px;
    border:1.5px solid var(--line);border-radius:10px;
    background:#FCFBF7;color:var(--ink);outline:none;
    transition:border-color .15s;font-family:inherit;
  }
  .field input:focus{border-color:var(--olive)}

  .account{
    margin-top:14px;background:var(--card);
    border:1.5px dashed var(--honey);border-radius:var(--radius);padding:16px;
  }
  .account .sec-title{color:var(--honey);margin-bottom:8px}
  .acc-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .acc-num{font-size:16.5px;font-weight:800;letter-spacing:.02em}
  .acc-holder{font-size:13px;color:#7A766A;margin-top:2px}
  .copy-btn{
    border:1.5px solid var(--honey);background:#fff;color:var(--honey);
    font-size:12.5px;font-weight:700;border-radius:8px;padding:7px 13px;
    cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;
    font-family:inherit;transition:all .15s;
  }
  .copy-btn:active{background:var(--honey);color:#fff}

  .totalbar{
    position:fixed;bottom:0;left:0;right:0;background:var(--olive-deep);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    box-shadow:0 -4px 16px rgba(0,0,0,.12);z-index:50;
  }
  .totalbar-inner{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .total-info{flex:1;color:#F6F3E8}
  .total-label{font-size:11.5px;opacity:.75}
  .total-amount{font-size:20px;font-weight:800;letter-spacing:-.01em}
  .total-amount small{font-size:12px;font-weight:500;opacity:.75;margin-left:6px}
  .submit-btn{
    background:var(--honey);color:#3A2E10;border:none;
    font-size:15px;font-weight:800;border-radius:11px;padding:13px 22px;
    cursor:pointer;flex-shrink:0;font-family:inherit;
    -webkit-tap-highlight-color:transparent;transition:transform .1s;
  }
  .submit-btn:active{transform:scale(.97)}
  .submit-btn:disabled{opacity:.4;cursor:default}

  .modal-bg{
    position:fixed;inset:0;background:rgba(30,28,20,.55);
    display:none;align-items:flex-end;justify-content:center;z-index:100;
  }
  .modal-bg.show{display:flex}
  .modal{
    background:var(--wool);width:100%;max-width:520px;
    border-radius:20px 20px 0 0;
    padding:22px 18px calc(24px + env(safe-area-inset-bottom));
    animation:up .25s ease;
  }
  @keyframes up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal h2{font-size:17px;font-weight:800;margin-bottom:4px}
  .modal .sub{font-size:13px;color:#7A766A;margin-bottom:14px}
  .order-text{
    background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:14px;font-size:13.5px;white-space:pre-wrap;
    max-height:34vh;overflow-y:auto;margin-bottom:14px;line-height:1.6;
  }
  .modal-btns{display:flex;gap:8px}
  .modal-btns button{
    flex:1;padding:13px;border-radius:11px;font-size:14.5px;font-weight:700;
    cursor:pointer;font-family:inherit;border:none;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-submit{background:var(--olive);color:#fff}
  .btn-submit:disabled{opacity:.5}
  .btn-close{background:#E9E5DA;color:#5C5950}

  /* 완료 화면 */
  .done{text-align:center;padding:10px 0 4px}
  .done .mark{font-size:44px;margin-bottom:10px}
  .done h2{margin-bottom:6px}
  .done p{font-size:13.5px;color:#6B675C;margin-bottom:16px}
  .done .acc-box{
    background:#fff;border:1.5px dashed var(--honey);border-radius:12px;
    padding:14px;margin-bottom:14px;text-align:center;
  }

  .toast{
    position:fixed;left:50%;bottom:110px;
    transform:translateX(-50%) translateY(8px);
    background:#2B2A26;color:#fff;font-size:13px;font-weight:600;
    padding:10px 18px;border-radius:999px;opacity:0;
    transition:all .25s;pointer-events:none;z-index:200;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  footer{text-align:center;font-size:12px;color:#A39F93;padding:26px 16px 8px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════
   ★ 구글폼 연동 설정 — 이 부분만 수정하면 됩니다 ★

   1) 구글폼을 새로 만들고 질문 3개를 추가하세요 (모두 단답형/장문형):
      ① 이름 (단답형)
      ② 신청 내역 (장문형)
      ③ 합계 금액 (단답형)

   2) 폼의 [보내기] → 링크 복사 → 주소에서 FORM_ID 확인:
      https://docs.google.com/forms/d/e/【이부분이FORM_ID】/viewform

   3) entry 번호 확인:
      폼 미리보기 화면에서 마우스 우클릭 → [페이지 소스 보기] →
      Ctrl+F 로 "entry." 검색 → 질문 순서대로 entry.숫자 3개를 찾아
      아래에 순서대로 입력하세요.
      (또는 ⋮ 메뉴 → '미리 채워진 링크 만들기'에서 각 칸에 임의값 입력 후
       생성된 링크의 entry.숫자 확인)
═══════════════════════════════════════════════════ */
const GFORM = {
  formId: "1FAIpQLSdXJF7yHN7DIJKCzBYM0QCwzC-J-OFIB3Sk2wk5-aAi8hnCFg",
  entryName:  "entry.261096508",  // ① 이름
  entryItems: "entry.1867241410",  // ② 신청 내역
  entryTotal: "entry.1332549736",  // ③ 합계 금액
};
/* ═══════════════════════════════════════════════════ */

const GOODS = [
  {name:"양 인형",           orig:25000, sale:17500},
  {name:"양 키링",           orig:15000, sale:10500},
  {name:"컬러링북",          orig:9900,  sale:6900},
  {name:"컨셉아트 필사노트",  orig:9900,  sale:6900},
  {name:"아크릴 마그넷",      orig:9000,  sale:6300},
  {name:"나무 마그넷",        orig:7000,  sale:5500},
  {name:"테피스트리 팔찌",    orig:7000,  sale:5500},
  {name:"랜티큘러 책갈피",    orig:4000,  sale:3200},
  {name:"캐릭터 젤펜",        orig:3500,  sale:2800},
];
const qty = GOODS.map(()=>0);
const fmt = n => n.toLocaleString('ko-KR');

function render(){
  document.getElementById('items').innerHTML = GOODS.map((g,i)=>{
    const off = Math.round((1 - g.sale/g.orig)*100);
    return `
    <div class="item ${qty[i]>0?'selected':''}" id="item-${i}">
      <div class="item-info">
        <div class="item-name">${g.name}</div>
        <div class="item-price">
          <span class="orig">${fmt(g.orig)}원</span>
          <span class="sale-price">${fmt(g.sale)}원</span>
          <span class="off">${off}%</span>
        </div>
      </div>
      <div class="stepper">
        <button type="button" aria-label="${g.name} 수량 줄이기" onclick="change(${i},-1)">−</button>
        <div class="qty" id="qty-${i}">${qty[i]}</div>
        <button type="button" aria-label="${g.name} 수량 늘리기" onclick="change(${i},1)">＋</button>
      </div>
    </div>`;
  }).join('');
  updateTotal();
}

function change(i,d){
  qty[i] = Math.max(0, Math.min(99, qty[i]+d));
  document.getElementById('qty-'+i).textContent = qty[i];
  document.getElementById('item-'+i).classList.toggle('selected', qty[i]>0);
  updateTotal();
}

function calcTotal(){
  let total=0, cnt=0;
  GOODS.forEach((g,i)=>{ total += g.sale*qty[i]; cnt += qty[i]; });
  return {total, cnt};
}

function updateTotal(){
  const {total, cnt} = calcTotal();
  document.getElementById('totalAmt').textContent = fmt(total);
  document.getElementById('totalCnt').textContent = cnt>0 ? `총 ${cnt}개` : '';
  document.getElementById('submitBtn').disabled = cnt===0;
}

function buildItemsText(){
  return GOODS.map((g,i)=> qty[i]>0
    ? `${g.name} ${fmt(g.sale)}원 × ${qty[i]} = ${fmt(g.sale*qty[i])}원`
    : null).filter(Boolean).join("\n");
}

function buildOrderText(){
  const name = document.getElementById('name').value.trim();
  const {total} = calcTotal();
  return [
    "[다윗 굿즈 간사 할인 신청]","",
    "이름 : "+name,"",
    "── 신청 내역 ──",
    buildItemsText(),
    "──────────",
    `합계 : ${fmt(total)}원`,"",
    "입금계좌 : 국민은행 268801-04-057171",
    "예금주 : 선양욱"
  ].join("\n");
}

function openModal(){
  const name = document.getElementById('name').value.trim();
  if(!name){
    showToast("이름을 입력해 주세요");
    document.getElementById('name').focus();
    return;
  }
  document.getElementById('modalBody').innerHTML = `
    <h2>신청 내용 확인</h2>
    <div class="sub">내용을 확인한 뒤 [신청 제출]을 눌러 주세요.</div>
    <div class="order-text">${escapeHtml(buildOrderText())}</div>
    <div class="modal-btns">
      <button class="btn-close" onclick="closeModal()">닫기</button>
      <button class="btn-submit" id="sendBtn" onclick="submitToGoogleForm()">신청 제출</button>
    </div>`;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
}
function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function submitToGoogleForm(){
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = "전송 중…";

  const name = document.getElementById('name').value.trim();
  const {total} = calcTotal();

  const params = new URLSearchParams();
  params.append(GFORM.entryName,  name);
  params.append(GFORM.entryItems, buildItemsText());
  params.append(GFORM.entryTotal, fmt(total)+"원");

  const url = `https://docs.google.com/forms/d/e/${GFORM.formId}/formResponse`;

  try{
    await fetch(url, {
      method: "POST",
      mode: "no-cors",   // 구글폼은 CORS를 허용하지 않으므로 응답 확인 불가(정상)
      headers: {"Content-Type":"application/x-www-form-urlencoded"},
      body: params.toString()
    });
    showDone();
  }catch(e){
    btn.disabled = false;
    btn.textContent = "신청 제출";
    showToast("전송에 실패했습니다. 네트워크 확인 후 다시 시도해 주세요.");
  }
}

function showDone(){
  const name = document.getElementById('name').value.trim();
  const {total} = calcTotal();
  document.getElementById('modalBody').innerHTML = `
    <div class="done">
      <div class="mark">🐑✅</div>
      <h2>신청이 접수되었습니다</h2>
      <p>${escapeHtml(name)} 간사님, 아래 계좌로 <b>${fmt(total)}원</b> 입금 시<br>신청이 최종 확정됩니다.</p>
      <div class="acc-box">
        <div class="acc-num">국민은행 268801-04-057171</div>
        <div class="acc-holder">예금주 : 선양욱</div>
      </div>
      <div class="modal-btns">
        <button class="btn-close" onclick="resetAll()">닫기</button>
        <button class="btn-submit" onclick="copyAccount()">계좌 복사</button>
      </div>
    </div>`;
}

function resetAll(){
  closeModal();
  GOODS.forEach((g,i)=> qty[i]=0);
  document.getElementById('name').value = "";
  render();
}

async function copyText(t, msg){
  try{
    await navigator.clipboard.writeText(t);
    showToast(msg);
  }catch(e){
    const ta=document.createElement('textarea');
    ta.value=t;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    showToast(msg);
  }
}
function copyAccount(){ copyText("국민은행 268801-04-057171 선양욱", "계좌번호가 복사되었습니다"); }

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

render();
</script>
</body>
</html>
